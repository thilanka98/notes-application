server {
    listen 80;
    server_name notes.yourdomain.com;

    # Redirect HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name notes.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/luxuryevents.thilanka.abrdns.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/luxuryevents.thilanka.abrdns.com/privkey.pem;

    # React frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Django API (internal only)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
