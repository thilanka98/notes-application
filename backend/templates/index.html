<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes — CRUD App</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --surface2: #1c1c20;
      --border: #2a2a30;
      --accent: #c8f04a;
      --accent-dim: #9bb82f;
      --text: #e8e8ec;
      --text-muted: #6b6b78;
      --text-soft: #a0a0ac;
      --danger: #ff5c5c;
      --danger-dim: #cc4444;
      --radius: 12px;
      --mono: 'DM Mono', monospace;
      --serif: 'Instrument Serif', serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      padding: 0;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 28px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(13,13,15,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .logo-title {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-style: italic;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .logo-badge {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 2px 8px;
      border-radius: 100px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .header-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .count-badge {
      font-size: 0.68rem;
      color: var(--accent);
      background: rgba(200, 240, 74, 0.1);
      border: 1px solid rgba(200, 240, 74, 0.2);
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: 0.05em;
    }

    /* Form */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
    }

    .form-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .form-title {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--text-soft);
      margin-bottom: 20px;
    }

    .form-title span {
      color: var(--accent);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.66rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    input[type="text"], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: vertical;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200, 240, 74, 0.08);
    }

    input[type="text"]::placeholder, textarea::placeholder {
      color: var(--text-muted);
    }

    textarea { min-height: 88px; }

    .form-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0d0d0f;
    }

    .btn-primary:hover {
      background: #d8ff5a;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(200, 240, 74, 0.25);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    .btn-danger-ghost {
      background: transparent;
      color: var(--danger);
      border: 1px solid transparent;
      padding: 6px 12px;
      font-size: 0.72rem;
    }

    .btn-danger-ghost:hover {
      background: rgba(255, 92, 92, 0.08);
      border-color: rgba(255,92,92,0.2);
    }

    .btn-edit-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid transparent;
      padding: 6px 12px;
      font-size: 0.72rem;
    }

    .btn-edit-ghost:hover {
      color: var(--accent);
      background: rgba(200,240,74,0.06);
      border-color: rgba(200,240,74,0.15);
    }

    /* Notes list */
    .notes-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      transition: border-color 0.2s, transform 0.15s;
      animation: slideIn 0.25s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .note-card:hover {
      border-color: #3a3a44;
      transform: translateY(-1px);
    }

    .note-card.editing {
      border-color: var(--accent);
      background: #141a0d;
    }

    .note-id {
      font-size: 0.62rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .note-title {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-style: italic;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .note-description {
      font-size: 0.8rem;
      color: var(--text-soft);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .note-meta {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .note-actions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
    }

    /* Inline edit form */
    .inline-edit {
      grid-column: 1 / -1;
      display: none;
      flex-direction: column;
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .inline-edit.open { display: flex; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-title {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.3rem;
      color: var(--text-soft);
      margin-bottom: 8px;
    }

    .empty-sub {
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 32px;
      right: 32px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 500;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 0.78rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: toastIn 0.25s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .toast.success { border-left: 3px solid var(--accent); }
    .toast.error { border-left: 3px solid var(--danger); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { color: #ff5c5c; font-size: 0.72rem; margin-top: 6px; }

    /* API status indicator */
    .api-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.68rem;
      color: var(--text-muted);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .status-dot.offline { background: var(--danger); }

    @media (max-width: 600px) {
      header { padding: 20px 20px; }
      main { padding: 32px 16px 64px; }
      .note-card { grid-template-columns: 1fr; }
      .note-actions { flex-direction: row; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-title">Notes</span>
    <span class="logo-badge">CRUD</span>
  </div>
  <div class="api-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusLabel">connecting...</span>
  </div>
</header>

<main>
  <!-- Create Form -->
  <div class="form-card">
    <p class="form-title">New <span>note</span></p>
    <div class="form-row">
      <div>
        <label for="newTitle">Title <span style="color:var(--danger)">*</span></label>
        <input type="text" id="newTitle" placeholder="What's on your mind?" />
        <div class="error-msg" id="titleError"></div>
      </div>
      <div>
        <label for="newDesc">Description</label>
        <textarea id="newDesc" placeholder="Add some details..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="createNote()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Note
      </button>
      <button class="btn btn-ghost" onclick="clearForm()">Clear</button>
    </div>
  </div>

  <!-- Notes list -->
  <div class="section-header">
    <span class="section-label">All Notes</span>
    <span class="count-badge" id="notesCount">0 notes</span>
  </div>

  <div id="notesList" class="notes-grid">
    <div class="loading"><span class="spinner"></span> loading notes...</div>
  </div>
</main>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  const API = '/api/notes/';

  // ── API helpers ──────────────────────────────────────────────
  async function apiFetch(url, options = {}) {
    const res = await fetch(url, {
      headers: { 'Content-Type': 'application/json' },
      ...options
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw { status: res.status, data };
    return data;
  }

  // ── Status indicator ─────────────────────────────────────────
  async function checkStatus() {
    try {
      await fetch(API);
      document.getElementById('statusDot').className = 'status-dot online';
      document.getElementById('statusLabel').textContent = 'api online';
    } catch {
      document.getElementById('statusDot').className = 'status-dot offline';
      document.getElementById('statusLabel').textContent = 'api offline';
    }
  }

  // ── Load notes ───────────────────────────────────────────────
  async function loadNotes() {
    try {
      const notes = await apiFetch(API);
      renderNotes(notes);
      document.getElementById('notesCount').textContent =
        `${notes.length} ${notes.length === 1 ? 'note' : 'notes'}`;
    } catch (e) {
      document.getElementById('notesList').innerHTML =
        `<div class="loading" style="color:var(--danger)">Failed to load notes.</div>`;
    }
  }

  // ── Render notes ─────────────────────────────────────────────
  function renderNotes(notes) {
    const container = document.getElementById('notesList');
    if (!notes.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <p class="empty-title">No notes yet</p>
          <p class="empty-sub">Create your first note above</p>
        </div>`;
      return;
    }
    container.innerHTML = notes.map(n => `
      <div class="note-card" id="card-${n.id}">
        <div>
          <div class="note-id">id · ${n.id}</div>
          <div class="note-title">${escHtml(n.title)}</div>
          ${n.description ? `<div class="note-description">${escHtml(n.description)}</div>` : ''}
          <div class="note-meta">
            ${formatDate(n.created_at)}
            ${n.updated_at !== n.created_at ? ' · edited' : ''}
          </div>
        </div>
        <div class="note-actions">
          <button class="btn btn-edit-ghost" onclick="toggleEdit(${n.id}, '${escAttr(n.title)}', '${escAttr(n.description || '')}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit
          </button>
          <button class="btn btn-danger-ghost" onclick="deleteNote(${n.id})">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            Delete
          </button>
        </div>
        <div class="inline-edit" id="edit-${n.id}">
          <div>
            <label>Title <span style="color:var(--danger)">*</span></label>
            <input type="text" id="edit-title-${n.id}" value="${escAttr(n.title)}" />
          </div>
          <div>
            <label>Description</label>
            <textarea id="edit-desc-${n.id}">${escHtml(n.description || '')}</textarea>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" onclick="updateNote(${n.id})">Save</button>
            <button class="btn btn-ghost" onclick="closeEdit(${n.id})">Cancel</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  // ── Create note ──────────────────────────────────────────────
  async function createNote() {
    const title = document.getElementById('newTitle').value.trim();
    const description = document.getElementById('newDesc').value.trim();
    document.getElementById('titleError').textContent = '';

    if (!title) {
      document.getElementById('titleError').textContent = 'Title is required.';
      document.getElementById('newTitle').focus();
      return;
    }

    try {
      await apiFetch(API, { method: 'POST', body: JSON.stringify({ title, description }) });
      clearForm();
      await loadNotes();
      toast('Note created', 'success');
    } catch (e) {
      toast('Failed to create note', 'error');
    }
  }

  // ── Update note ──────────────────────────────────────────────
  async function updateNote(id) {
    const title = document.getElementById(`edit-title-${id}`).value.trim();
    const description = document.getElementById(`edit-desc-${id}`).value.trim();

    if (!title) {
      toast('Title is required', 'error');
      return;
    }

    try {
      await apiFetch(`${API}${id}/`, { method: 'PUT', body: JSON.stringify({ title, description }) });
      await loadNotes();
      toast('Note updated', 'success');
    } catch (e) {
      toast('Failed to update note', 'error');
    }
  }

  // ── Delete note ──────────────────────────────────────────────
  async function deleteNote(id) {
    if (!confirm('Delete this note?')) return;
    try {
      await apiFetch(`${API}${id}/`, { method: 'DELETE' });
      document.getElementById(`card-${id}`)?.remove();
      await loadNotes();
      toast('Note deleted', 'success');
    } catch (e) {
      toast('Failed to delete note', 'error');
    }
  }

  // ── Edit toggle ──────────────────────────────────────────────
  function toggleEdit(id, title, description) {
    const editPanel = document.getElementById(`edit-${id}`);
    const card = document.getElementById(`card-${id}`);
    const isOpen = editPanel.classList.contains('open');

    // Close all others
    document.querySelectorAll('.inline-edit.open').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.note-card.editing').forEach(el => el.classList.remove('editing'));

    if (!isOpen) {
      editPanel.classList.add('open');
      card.classList.add('editing');
      document.getElementById(`edit-title-${id}`).focus();
    }
  }

  function closeEdit(id) {
    document.getElementById(`edit-${id}`)?.classList.remove('open');
    document.getElementById(`card-${id}`)?.classList.remove('editing');
  }

  // ── Helpers ──────────────────────────────────────────────────
  function clearForm() {
    document.getElementById('newTitle').value = '';
    document.getElementById('newDesc').value = '';
    document.getElementById('titleError').textContent = '';
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(s) {
    return String(s).replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/\n/g, ' ');
  }

  function toast(msg, type = 'success') {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    const icons = { success: '✓', error: '✕' };
    el.innerHTML = `<span>${icons[type] || '·'}</span> ${msg}`;
    container.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  // Enter key on title input to submit
  document.getElementById('newTitle').addEventListener('keydown', e => {
    if (e.key === 'Enter') createNote();
  });

  // Init
  checkStatus();
  loadNotes();
</script>
</body>
</html>
